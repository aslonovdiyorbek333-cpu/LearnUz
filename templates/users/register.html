{% extends 'base/base.html' %}

{% block title %}Ro'yxatdan o'tish - LearnUz{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-body p-5">
                <h2 class="text-center mb-4">
                    <i class="fas fa-user-plus text-warning"></i> Ro'yxatdan o'tish
                </h2>
                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label fw-bold">Username</label>
                        <input type="text" name="username" class="form-control" value="{{ username|default:'' }}" placeholder="masalan: ali_karimov">
                        <small class="text-muted">Faqat harf, raqam va _ belgisi</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Email</label>
                        <input type="email" name="email" class="form-control" value="{{ email|default:'' }}" placeholder="masalan: ali@gmail.com">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Parol</label>
                        <input type="password" name="password1" class="form-control" placeholder="Kamida 8 belgi">
                        <small class="text-muted">Kamida 8 belgi, 1 katta harf va 1 raqam</small>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Parolni tasdiqlash</label>
                        <input type="password" name="password2" class="form-control" placeholder="Parolni qayta yozing">
                    </div>
                    <button type="submit" class="btn btn-warning w-100 btn-lg mt-2">
                        <i class="fas fa-user-plus"></i> Ro'yxatdan o'tish
                    </button>
                </form>
                <hr>
                <p class="text-center">
                    Allaqachon hisobingiz bormi?
                    <a href="/login/" class="text-warning">Kirish</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
